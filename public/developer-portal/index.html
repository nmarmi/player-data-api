<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DraftIQ Developer Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.25rem; font-weight: 700; color: #38bdf8; }
    header span { font-size: 0.875rem; color: #94a3b8; }
    #logout-btn { background: none; border: 1px solid #475569; color: #94a3b8; padding: 0.35rem 0.85rem; border-radius: 6px; cursor: pointer; font-size: 0.875rem; }
    #logout-btn:hover { border-color: #ef4444; color: #ef4444; }
    main { max-width: 800px; margin: 2.5rem auto; padding: 0 1.5rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 2rem; margin-bottom: 1.75rem; }
    .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; color: #f1f5f9; }
    label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.3rem; margin-top: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 0.6rem 0.8rem; background: #0f172a; border: 1px solid #334155;
      border-radius: 6px; color: #e2e8f0; font-size: 0.95rem;
    }
    input:focus { outline: 2px solid #38bdf8; border-color: transparent; }
    button.primary { margin-top: 1.25rem; padding: 0.65rem 1.5rem; background: #0284c7; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    button.primary:hover { background: #0369a1; }
    button.danger { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; border-radius: 6px; padding: 0.35rem 0.85rem; font-size: 0.8rem; cursor: pointer; }
    button.danger:hover { background: #991b1b; }
    .tab-row { display: flex; gap: 0.5rem; margin-bottom: 1.75rem; }
    .tab-row button { background: none; border: 1px solid #334155; color: #94a3b8; padding: 0.45rem 1.1rem; border-radius: 6px; cursor: pointer; font-size: 0.875rem; }
    .tab-row button.active { background: #0284c7; border-color: #0284c7; color: #fff; }
    .msg { margin-top: 0.75rem; padding: 0.65rem 1rem; border-radius: 6px; font-size: 0.875rem; }
    .msg.ok { background: #052e16; color: #86efac; border: 1px solid #166534; }
    .msg.err { background: #450a0a; color: #fca5a5; border: 1px solid #991b1b; }
    .key-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #1e293b; font-size: 0.875rem; }
    .key-row:last-child { border-bottom: none; }
    .key-label { font-weight: 600; }
    .key-meta { color: #64748b; font-size: 0.8rem; margin-top: 0.2rem; }
    .raw-key-banner { margin-top: 1rem; background: #1a2e1a; border: 1px solid #166534; border-radius: 8px; padding: 1rem; }
    .raw-key-banner code { word-break: break-all; font-size: 0.85rem; color: #86efac; display: block; margin: 0.5rem 0 1rem; }
    #page-dashboard { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>DraftIQ Developer Portal</h1>
    <div>
      <span id="header-email"></span>
      <button id="logout-btn" style="display:none" onclick="doLogout()">Log out</button>
    </div>
  </header>

  <!-- Auth page -->
  <main id="page-auth">
    <div class="tab-row">
      <button class="active" id="tab-login" onclick="switchTab('login')">Sign in</button>
      <button id="tab-register" onclick="switchTab('register')">Create account</button>
    </div>

    <div class="card" id="panel-login">
      <h2>Sign in to your account</h2>
      <label>Email</label><input type="email" id="login-email" placeholder="you@example.com" />
      <label>Password</label><input type="password" id="login-password" />
      <button class="primary" onclick="doLogin()">Sign in</button>
      <div id="login-msg"></div>
    </div>

    <div class="card" id="panel-register" style="display:none">
      <h2>Create a developer account</h2>
      <label>Email</label><input type="email" id="reg-email" placeholder="you@example.com" />
      <label>Password <span style="color:#64748b">(min 8 characters)</span></label>
      <input type="password" id="reg-password" />
      <label>Confirm password</label><input type="password" id="reg-confirm" />
      <button class="primary" onclick="doRegister()">Create account</button>
      <div id="reg-msg"></div>
    </div>
  </main>

  <!-- Dashboard page -->
  <main id="page-dashboard">
    <div class="card">
      <h2>My API Keys</h2>
      <div id="keys-list"><em style="color:#64748b">Loading…</em></div>
      <hr style="border-color:#334155; margin:1.25rem 0" />
      <h2 style="margin-bottom:1rem">Create new key</h2>
      <label>Label</label><input type="text" id="new-key-label" placeholder="e.g. draft-kit-prod" />
      <button class="primary" onclick="doCreateKey()">Generate key</button>
      <div id="new-key-banner"></div>
      <div id="create-key-msg"></div>
    </div>

    <div class="card">
      <h2>Account</h2>
      <p style="color:#94a3b8; font-size:0.9rem">Signed in as <strong id="account-email" style="color:#e2e8f0"></strong></p>
    </div>
  </main>

  <script>
    const API = '/api/v1/developer';
    let currentKeys = [];

    async function api(method, path, body) {
      const opts = { method, credentials: 'same-origin', headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch(API + path, opts);
      return { status: r.status, data: await r.json().catch(() => ({})) };
    }

    function showMsg(elId, text, isErr) {
      const el = document.getElementById(elId);
      el.className = 'msg ' + (isErr ? 'err' : 'ok');
      el.textContent = text;
    }

    function switchTab(tab) {
      document.getElementById('panel-login').style.display = tab === 'login' ? '' : 'none';
      document.getElementById('panel-register').style.display = tab === 'register' ? '' : 'none';
      document.getElementById('tab-login').className = tab === 'login' ? 'active' : '';
      document.getElementById('tab-register').className = tab === 'register' ? 'active' : '';
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const { status, data } = await api('POST', '/login', { email, password });
      if (status === 200) { showDashboard(data.account); }
      else { showMsg('login-msg', data.error || 'Login failed', true); }
    }

    async function doRegister() {
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      if (password !== confirm) return showMsg('reg-msg', 'Passwords do not match', true);
      const { status, data } = await api('POST', '/register', { email, password });
      if (status === 201) { showDashboard(data.account); }
      else { showMsg('reg-msg', data.error || 'Registration failed', true); }
    }

    async function doLogout() {
      await api('POST', '/logout');
      showAuth();
    }

    async function doCreateKey() {
      const label = document.getElementById('new-key-label').value.trim() || 'unnamed';
      const { status, data } = await api('POST', '/keys', { label });
      if (status === 201) {
        document.getElementById('new-key-banner').innerHTML = `
          <div class="raw-key-banner">
            <strong style="color:#86efac">Key created — copy it now, it will not be shown again:</strong>
            <code>${data.key}</code>
            <button class="primary" style="margin-top:0" onclick="copyKey('${data.key}')">Copy to clipboard</button>
          </div>`;
        document.getElementById('new-key-label').value = '';
        loadKeys();
      } else {
        showMsg('create-key-msg', data.error || 'Failed to create key', true);
      }
    }

    function copyKey(raw) {
      navigator.clipboard.writeText(raw).then(() => alert('Copied!')).catch(() => {});
    }

    async function revokeKey(id) {
      if (!confirm('Revoke this key? All requests using it will start returning 401.')) return;
      const { status } = await api('DELETE', '/keys/' + id);
      if (status === 200) loadKeys();
    }

    async function loadKeys() {
      const { status, data } = await api('GET', '/keys');
      const container = document.getElementById('keys-list');
      if (status !== 200) { container.innerHTML = '<em style="color:#ef4444">Could not load keys</em>'; return; }
      currentKeys = data.keys || [];
      if (!currentKeys.length) { container.innerHTML = '<em style="color:#64748b">No keys yet</em>'; return; }
      container.innerHTML = currentKeys.map(k => `
        <div class="key-row">
          <div>
            <div class="key-label">${escHtml(k.label || 'Unnamed')}</div>
            <div class="key-meta">Created ${new Date(k.createdAt).toLocaleDateString()} · Last used ${k.lastUsedAt ? new Date(k.lastUsedAt).toLocaleDateString() : 'never'}</div>
            ${k.ipWhitelist?.length ? `<div class="key-meta">IPs: ${escHtml(k.ipWhitelist.join(', '))}</div>` : ''}
          </div>
          <button class="danger" onclick="revokeKey(${k.id})">Revoke</button>
        </div>`).join('');
    }

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function showDashboard(account) {
      document.getElementById('page-auth').style.display = 'none';
      document.getElementById('page-dashboard').style.display = '';
      document.getElementById('header-email').textContent = account.email;
      document.getElementById('logout-btn').style.display = '';
      document.getElementById('account-email').textContent = account.email;
      loadKeys();
    }

    function showAuth() {
      document.getElementById('page-auth').style.display = '';
      document.getElementById('page-dashboard').style.display = 'none';
      document.getElementById('header-email').textContent = '';
      document.getElementById('logout-btn').style.display = 'none';
    }

    // On load — check if already signed in
    (async () => {
      try {
        const { status, data } = await api('GET', '/me');
        if (status === 200) showDashboard(data.account);
        else showAuth();
      } catch (_) {
        showAuth();
      }
    })();
  </script>
</body>
</html>
